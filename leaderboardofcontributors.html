<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contributor Leaderboard | Top Contributors Ranking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .label {
            color: #718096;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Filter Bar */
        .filter-bar {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .filter-title {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            font-weight: 500;
            color: #4a5568;
            min-width: 80px;
            display: flex;
            align-items: center;
        }

        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            flex: 1;
        }

        .filter-btn {
            padding: 8px 20px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        /* Leaderboard Table */
        .leaderboard-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .leaderboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .leaderboard-header h2 {
            font-size: 1.3rem;
        }

        .sort-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 6px 15px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .sort-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .sort-btn.active {
            background: white;
            color: #667eea;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table th {
            background: #f7fafc;
            padding: 15px 20px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }

        .leaderboard-table td {
            padding: 15px 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .leaderboard-table tr:hover {
            background: #f7fafc;
            cursor: pointer;
        }

        /* Rank styling */
        .rank-1 {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            font-weight: bold;
            font-size: 1.2rem;
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            border-radius: 50%;
        }

        .rank-2 {
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 100%);
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            border-radius: 50%;
        }

        .rank-3 {
            background: linear-gradient(135deg, #cd7f32 0%, #e8a87b 100%);
            font-weight: bold;
            font-size: 1rem;
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            border-radius: 50%;
        }

        .rank-number {
            display: inline-block;
            width: 35px;
            height: 35px;
            line-height: 35px;
            text-align: center;
            background: #e2e8f0;
            border-radius: 50%;
            font-weight: bold;
        }

        .medal {
            font-size: 1.5rem;
        }

        .contributor-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }

        .score-badge {
            display: inline-block;
            padding: 5px 12px;
            background: #48bb78;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .contribution-breakdown {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .breakdown-item {
            font-size: 0.75rem;
            padding: 3px 8px;
            background: #e2e8f0;
            border-radius: 12px;
        }

        /* Activity Timeline */
        .activity-timeline {
            margin-top: 25px;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .activity-timeline h3 {
            color: #2d3748;
            margin-bottom: 20px;
        }

        .activity-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .activity-item {
            padding: 12px;
            border-left: 3px solid #667eea;
            margin-bottom: 10px;
            background: #f7fafc;
            border-radius: 8px;
        }

        .activity-time {
            font-size: 0.7rem;
            color: #a0aec0;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #a0aec0;
        }

        @media (max-width: 768px) {
            .leaderboard-table th,
            .leaderboard-table td {
                padding: 10px;
                font-size: 0.8rem;
            }
            
            .avatar {
                width: 35px;
                height: 35px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

                ],
                badges: ["📚 New Contributor", "⭐ Promising Talent"]
            }
        ];

        // Contribution history for timeline
        let allActivities = [];

        // Initialize activities from contributors
        contributors.forEach(contributor => {
            contributor.recentActivity.forEach(activity => {
                allActivities.push({
                    contributorId: contributor.id,
                    contributorName: contributor.name,
                    ...activity
                });
            });
        });

        // Scoring system weights
        const SCORING = {
            translation: 10,
            content: 15,
            review: 5
        };

        // State
        let currentView = "leaderboard";
        let sortBy = "total";
        let sortOrder = "desc";
        let filterTime = "all";
        let filterState = "all";
        let filterType = "all";
        let selectedContributor = null;

        // Helper functions
        function saveToLocalStorage() {
            localStorage.setItem('contributors', JSON.stringify(contributors));
            localStorage.setItem('allActivities', JSON.stringify(allActivities));
        }

        function loadFromLocalStorage() {
            const savedContributors = localStorage.getItem('contributors');
            const savedActivities = localStorage.getItem('allActivities');
            if (savedContributors) contributors = JSON.parse(savedContributors);
            if (savedActivities) allActivities = JSON.parse(savedActivities);
        }

        function calculateTotalScore(contributor) {
            return contributor.contributions.translations * SCORING.translation +
                   contributor.contributions.content * SCORING.content +
                   contributor.contributions.reviews * SCORING.review;
        }

        function getFilteredContributors() {
            let filtered = [...contributors];
            
            if (filterTime !== "all") {
                const now = new Date();
                const timeMap = {
                    week: 7,
                    month: 30,
                    year: 365
                };
                const days = timeMap[filterTime];
                const cutoffDate = new Date(now.setDate(now.getDate() - days));
                
                filtered = filtered.filter(c => new Date(c.joinDate) >= cutoffDate);
            }
            
            if (filterState === "active") {
                filtered = filtered.filter(c => calculateTotalScore(c) > 100);
            } else if (filterState === "new") {
                filtered = filtered.filter(c => calculateTotalScore(c) <= 100);
            }
            
            if (filterType !== "all") {
                const typeMap = {
                    translations: "translations",
                    content: "content",
                    reviews: "reviews"
                };
                filtered = filtered.filter(c => c.contributions[typeMap[filterType]] > 0);
            }
            
            let sortField = sortBy;
            if (sortBy === "total") {
                filtered.sort((a, b) => {
                    const scoreA = calculateTotalScore(a);
                    const scoreB = calculateTotalScore(b);
                    return sortOrder === "desc" ? scoreB - scoreA : scoreA - scoreB;
                });
            } else {
                filtered.sort((a, b) => {
                    const valA = a.contributions[sortBy];
                    const valB = b.contributions[sortBy];
                    return sortOrder === "desc" ? valB - valA : valA - valB;
                });
            }
            
            return filtered;
        }

        function getFilteredActivities() {
            let filtered = [...allActivities];
            
            if (filterType !== "all") {
                filtered = filtered.filter(a => a.type === filterType);
            }
            
            if (filterTime !== "all") {
                const now = new Date();
                const timeMap = {
                    week: 7,
                    month: 30,
                    year: 365
                };
                const days = timeMap[filterTime];
                const cutoffDate = new Date(now.setDate(now.getDate() - days));
                filtered = filtered.filter(a => new Date(a.date) >= cutoffDate);
            }
            
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            return filtered.slice(0, 20);
        }

        function getStats() {
            const totalContributors = contributors.length;
            const totalContributions = contributors.reduce((sum, c) => sum + c.contributions.total, 0);
            const totalPoints = contributors.reduce((sum, c) => sum + calculateTotalScore(c), 0);
            const activeContributors = contributors.filter(c => calculateTotalScore(c) > 100).length;
            
            return { totalContributors, totalContributions, totalPoints, activeContributors };
        }

        function getRankDisplay(index) {
            if (index === 0) return '<span class="medal">🥇</span>';
            if (index === 1) return '<span class="medal">🥈</span>';
            if (index === 2) return '<span class="medal">🥉</span>';
            return `<span class="rank-number">${index + 1}</span>`;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return "Today";
            if (diffDays === 1) return "Yesterday";
            if (diffDays < 7) return `${diffDays} days ago`;
            return date.toLocaleDateString();
        }

        function showContributorModal(contributor) {
            selectedContributor = contributor;

                        <div style="margin-bottom: 20px;">

                            <p><strong>📧 Email:</strong> ${escapeHtml(contributor.email)}</p>
                            <p><strong>📅 Joined:</strong> ${new Date(contributor.joinDate).toLocaleDateString()}</p>
                            <p><strong>⭐ Total Score:</strong> <span class="score-badge">${totalScore} points</span></p>
                        </div>
                        <div style="margin-bottom: 20px;">
                            <strong>🏅 Achievements:</strong>
                            <div style="margin-top: 10px;">
                                ${contributor.badges.map(badge => `<span class="breakdown-item">${escapeHtml(badge)}</span>`).join('')}
                            </div>
                        </div>
                        <div style="margin-bottom: 20px;">
                            <strong>📈 Contribution Stats:</strong>
                            <div style="margin-top: 10px;">
                                <span class="breakdown-item">🌐 Translations: ${contributor.contributions.translations}</span>
                                <span class="breakdown-item">📝 Content: ${contributor.contributions.content}</span>
                                <span class="breakdown-item">⭐ Reviews: ${contributor.contributions.reviews}</span>
                            </div>
                        </div>
                        <div class="modal-actions">
                            <button class="btn btn-secondary" onclick="closeModal()">Close</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        function closeModal() {
            const modal = document.getElementById('contributorModal');
            if (modal) modal.remove();
            selectedContributor = null;
        }

        // Render Functions
        function renderLeaderboard() {
            const filteredContributors = getFilteredContributors();
            const stats = getStats();
            const filteredActivities = getFilteredActivities();
            
            let leaderboardHtml = '';

                const rankDisplay = getRankDisplay(index);
                
                leaderboardHtml += `

                                </div>
                            </div>
                        </td>
                        <td style="text-align: center;">
                            <span class="score-badge">${totalScore} pts</span>
                        </td>
                        <td style="text-align: center;">${contributor.contributions.translations}</td>
                        <td style="text-align: center;">${contributor.contributions.content}</td>
                        <td style="text-align: center;">${contributor.contributions.reviews}</td>
                        <td>
                            <div class="contribution-breakdown">
                                ${contributor.badges.slice(0, 2).map(badge => 
                                    `<span class="breakdown-item">${escapeHtml(badge)}</span>`
                                ).join('')}
                                ${contributor.badges.length > 2 ? `<span class="breakdown-item">+${contributor.badges.length - 2}</span>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            if (leaderboardHtml === '') {
                leaderboardHtml = '<tr><td colspan="7" class="empty-state">No contributors found</td></tr>';
            }
            
            let activitiesHtml = '';
            filteredActivities.forEach(activity => {
                activitiesHtml += `
                    <div class="activity-item">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <strong>${escapeHtml(activity.contributorName)}</strong>
                            <span class="activity-time">${formatDate(activity.date)}</span>
                        </div>
                        <div style="margin-top: 5px;">${escapeHtml(activity.item)}</div>
                        <div style="margin-top: 5px;">
                            <span class="breakdown-item">+${activity.points} points</span>
                            <span class="breakdown-item">${activity.type}</span>
                        </div>
                    </div>
                `;
            });
            
            if (activitiesHtml === '') {
                activitiesHtml = '<div class="empty-state">No recent activities found</div>';
            }
            
            return `
                <div class="header">
                    <h1>🏆 Contributor Leaderboard</h1>
                    <p>Top contributors ranked by their activity and impact</p>
                </div>
                
                <div class="stats-bar">
                    <div class="stat-card">
                        <div class="icon">👥</div>
                        <div class="number">${stats.totalContributors}</div>
                        <div class="label">Total Contributors</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">📝</div>
                        <div class="number">${stats.totalContributions}</div>
                        <div class="label">Total Contributions</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">⭐</div>
                        <div class="number">${stats.totalPoints}</div>
                        <div class="label">Total Points</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">🔥</div>
                        <div class="number">${stats.activeContributors}</div>
                        <div class="label">Active Contributors</div>
                    </div>
                </div>
                
                <div class="filter-bar">
                    <div class="filter-title">🔍 Filter & Sort Contributors</div>
                    
                    <div class="filter-group">
                        <div class="filter-label">⏰ Time Period:</div>
                        <div class="filter-options">
                            <button class="filter-btn ${filterTime === 'all' ? 'active' : ''}" onclick="setFilterTime('all')">All Time</button>
                            <button class="filter-btn ${filterTime === 'week' ? 'active' : ''}" onclick="setFilterTime('week')">Last Week</button>
                            <button class="filter-btn ${filterTime === 'month' ? 'active' : ''}" onclick="setFilterTime('month')">Last Month</button>
                            <button class="filter-btn ${filterTime === 'year' ? 'active' : ''}" onclick="setFilterTime('year')">Last Year</button>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <div class="filter-label">📊 Contributor State:</div>
                        <div class="filter-options">
                            <button class="filter-btn ${filterState === 'all' ? 'active' : ''}" onclick="setFilterState('all')">All</button>
                            <button class="filter-btn ${filterState === 'active' ? 'active' : ''}" onclick="setFilterState('active')">Active (100+ pts)</button>
                            <button class="filter-btn ${filterState === 'new' ? 'active' : ''}" onclick="setFilterState('new')">New (≤100 pts)</button>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <div class="filter-label">🏷️ Contribution Type:</div>
                        <div class="filter-options">
                            <button class="filter-btn ${filterType === 'all' ? 'active' : ''}" onclick="setFilterType('all')">All Types</button>
                            <button class="filter-btn ${filterType === 'translations' ? 'active' : ''}" onclick="setFilterType('translations')">🌐 Translations</button>
                            <button class="filter-btn ${filterType === 'content' ? 'active' : ''}" onclick="setFilterType('content')">📝 Content</button>
                            <button class="filter-btn ${filterType === 'reviews' ? 'active' : ''}" onclick="setFilterType('reviews')">⭐ Reviews</button>
                        </div>
                    </div>
                </div>
                
                <div class="leaderboard-card">
                    <div class="leaderboard-header">
                        <h2>📊 Top Contributors Ranking</h2>
                        <div class="sort-buttons">
                            <button class="sort-btn ${sortBy === 'total' ? 'active' : ''}" onclick="setSortBy('total')">🏆 By Score</button>
                            <button class="sort-btn ${sortBy === 'translations' ? 'active' : ''}" onclick="setSortBy('translations')">🌐 Translations</button>
                            <button class="sort-btn ${sortBy === 'content' ? 'active' : ''}" onclick="setSortBy('content')">📝 Content</button>
                            <button class="sort-btn ${sortBy === 'reviews' ? 'active' : ''}" onclick="setSortBy('reviews')">⭐ Reviews</button>
                        </div>
                    </div>
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th style="width: 70px;">Rank</th>
                                <th>Contributor</th>
                                <th style="width: 100px;">Total Score</th>
                                <th style="width: 100px;">Translations</th>
                                <th style="width: 100px;">Content</th>
                                <th style="width: 100px;">Reviews</th>
                                <th>Badges</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${leaderboardHtml}
                        </tbody>
                    </table>
                </div>
                
                <div class="activity-timeline">
                    <h3>📅 Recent Activity Timeline</h3>
                    <div class="activity-list">
                        ${activitiesHtml}
                    </div>
                </div>
            `;
        }
        
        function render() {
            const app = document.getElementById('app');
            if (!app) return;
            
            const html = renderLeaderboard();
            app.innerHTML = html;
        }
        
        // Global Functions
        function setSortBy(type) {
            sortBy = type;
            render();
        }
        
        function setFilterTime(time) {
            filterTime = time;
            render();
        }
        
        function setFilterState(state) {
            filterState = state;
            render();
        }
        
        function setFilterType(type) {
            filterType = type;
            render();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Make functions global
        window.setSortBy = setSortBy;
        window.setFilterTime = setFilterTime;
        window.setFilterState = setFilterState;
        window.setFilterType = setFilterType;
        window.showContributorModal = showContributorModal;
        window.closeModal = closeModal;
        
        // Initialize
        loadFromLocalStorage();
        render();
    </script>
</body>
</html>
